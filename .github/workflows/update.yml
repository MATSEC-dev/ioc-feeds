name: Update Threat Intel Feeds

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Update OpenPhish
        run: python scripts/update_openphish.py

      - name: Update URLhaus
        run: python scripts/update_urlhaus.py

      - name: Update README
        run: python scripts/update_readme.py

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add feeds/ README.md

          git diff --staged --quiet || git commit -m "Automated IOC update"

          git push
